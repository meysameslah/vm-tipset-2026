<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VM-Tipset 2026</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--blue:#0b5cab;--dark:#06396f;--bg:#f4f6f8;--border:#d9dee5;--green:#0d7a3b;--red:#b00020;--yellow:#fff5cf}
*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:#222;font-size:16px}
header{background:linear-gradient(135deg,var(--blue),var(--dark));color:#fff;padding:20px 14px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px #0003}
header h1{margin:0 0 6px;font-size:24px}header p{margin:0;font-size:14px}.container{max-width:920px;margin:16px auto;padding:0 12px 80px}
.card,.controls,.admin,.match{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px #0001;border:1px solid #edf0f4;margin-bottom:14px}
.controls{display:grid;grid-template-columns:1fr;gap:10px}input,select,button{font-family:inherit;font-size:16px;width:100%;padding:12px;border-radius:10px}
input,select{border:1px solid var(--border);background:#fff}button{border:0;cursor:pointer;font-weight:700;background:var(--blue);color:#fff}
button.secondary{background:#555}button.danger{background:var(--red)}button.success{background:var(--green)}button:disabled{background:#b8c0cc}
.hidden{display:none!important}.row{display:grid;grid-template-columns:1fr;gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.date-title{margin:22px 0 10px;color:var(--dark);border-left:5px solid var(--blue);padding-left:10px;font-size:21px}
.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;color:#0b3f78;font-weight:800;font-size:18px;line-height:1.25}

  
.team{display:flex;align-items:center;gap:7px}.team.away{justify-content:flex-end;text-align:right}.flag{font-size:25px}.vs{color:#777;font-size:15px}
.meta{color:#666;font-size:13px;font-weight:700;margin:8px 0 12px}.tip-line{display:flex;gap:8px;justify-content:space-between;border-bottom:1px dashed #eee;padding:7px 0;font-size:14px}
.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef3fb;color:#0b3f78;font-weight:700;font-size:12px}
.ok{background:#e8f5ee;color:#0b6b34;border:1px solid #bcd9c8;padding:10px;border-radius:10px;font-weight:700;font-size:14px;margin:8px 0}
.closed{background:#fff0f0;color:#8a0018;border:1px solid #ffd0d6;padding:10px;border-radius:10px;font-weight:700;font-size:14px;margin:8px 0}
.ai{background:var(--yellow);border:1px solid #ffe08a;border-radius:10px;padding:9px;font-size:14px;margin-bottom:10px}.admin{border:2px solid #203b78}
table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #eee;text-align:left;font-size:14px}th{background:#eef3fb}
@media(min-width:760px){.controls{grid-template-columns:1fr 1fr 1fr 1fr}.row{grid-template-columns:1fr 1fr}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}}
</style></head><body><header><h1>VM-Tipset 2026 ⚽</h1><p>Alla ser varandras tips direkt. Tips läses efter matchstart.</p></header>
<div class="container">
<div id="setup" class="card"><b>Supabase saknas:</b> fyll i SUPABASE_URL och SUPABASE_ANON_KEY i koden.</div>
<div class="controls"><select id="person"></select><select id="groupFilter"><option value="">Alla grupper</option></select><input id="search" placeholder="Sök lag/grupp..."/><button onclick="loadData()">Uppdatera</button></div>
<div class="card"><h2>Status</h2><div id="status">Laddar...</div></div>
<div class="card"><button class="secondary" onclick="toggleAdmin()">Adminpanel</button></div>
<div id="adminPanel" class="admin hidden"><h2>Adminpanel</h2><div class="row"><input id="adminPin" type="password" placeholder="Admin-PIN"/><button onclick="adminLogin()">Logga in</button></div>
<div id="adminTools" class="hidden"><p><b>Admin aktiv.</b></p><div class="row"><select id="adminParticipant"></select><button class="danger" onclick="clearParticipant()">Rensa vald persons tips</button></div>
<div class="row"><select id="adminMatch"></select><button class="danger" onclick="clearMatch()">Rensa vald match</button></div>
<div class="row"><input id="adminStartTime" placeholder="Ny tid: 2026-06-11T18:00:00+02:00"/><button onclick="updateMatchTime()">Uppdatera tid</button></div>
<div class="row"><input id="adminActualScore" placeholder="Slutresultat 2-1"/><select id="adminDecidedBy"><option>ordinarie tid</option><option>Förlängning</option><option>straffar</option></select></div>
<div class="row"><input id="adminAdvancingTeam" placeholder="Lag vidare, vid slutspel"/><button onclick="updateResult()">Spara resultat</button></div></div></div>
<div id="matches"></div></div>
<script>
const SUPABASE_URL="https://apupqptraibyaxetpwao.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_mAmVC1BhgCDW7VwsT7tnew_PjTfwna2";
const ADMIN_PIN="2026";
let sb=null, participants=[], matches=[], predictions=[], isAdmin=false;
if(!SUPABASE_URL.includes("PASTE_")){sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);document.getElementById("setup").classList.add("hidden");loadData();}
function fmt(x){return new Date(x).toLocaleString("sv-SE",{dateStyle:"medium",timeStyle:"short"})}
function closed(m){return new Date()>=new Date(m.start_time)}
function pid(){return Number(document.getElementById("person").value)}
function byId(a,id){return a.find(x=>Number(x.id)===Number(id))}
async function loadData(){if(!sb)return;let [p,m,t]=await Promise.all([sb.from("participants").select("*").eq("active",true).order("name"),sb.from("matches").select("*").order("start_time").order("match_no"),sb.from("predictions").select("*")]);if(p.error||m.error||t.error){alert("Fel vid laddning");console.log(p.error,m.error,t.error);return}participants=p.data;matches=m.data;predictions=t.data;fill();renderStatus();renderMatches();}
function fill(){let old=document.getElementById("person").value;document.getElementById("person").innerHTML=participants.map(p=>`<option value="${p.id}">${p.name}</option>`).join("");if(old)document.getElementById("person").value=old;let gs=[...new Set(matches.map(m=>m.group_name).filter(Boolean))];document.getElementById("groupFilter").innerHTML='<option value="">Alla grupper</option>'+gs.map(g=>`<option>${g}</option>`).join("");document.getElementById("adminParticipant").innerHTML=participants.map(p=>`<option value="${p.id}">${p.name}</option>`).join("");document.getElementById("adminMatch").innerHTML=matches.map(m=>`<option value="${m.id}">Match ${m.match_no}: ${m.home_team} - ${m.away_team}</option>`).join("");}
function renderStatus(){document.getElementById("status").innerHTML='<table><tr><th>Namn</th><th>Tips</th><th>Status</th></tr>'+participants.map(p=>{let c=predictions.filter(x=>Number(x.participant_id)===Number(p.id)).length;return `<tr><td>${p.name}</td><td>${c}/${matches.length}</td><td>${c?"är… Tipsat":"är Ej tipsat"}</td></tr>`}).join("")+'</table>'}
function renderMatches(){let q=document.getElementById("search").value.toLowerCase(),g=document.getElementById("groupFilter").value,c=document.getElementById("matches");
  c.innerHTML="";
  let cur="";
  matches.filter(m=>(!g||m.group_name===g)&&`${m.home_team} ${m.away_team} ${m.group_name}`.toLowerCase().includes(q)).forEach(m=>{
    let d=new Date(m.start_time).toLocaleDateString("sv-SE",{day:"numeric",month:"long",year:"numeric"});
    if(d!==cur){cur=d;c.insertAdjacentHTML("beforeend",`<h2 class="date-title">${d}</h2>`)}
    let my=predictions.find(x=>Number(x.match_id)===Number(m.id)&&Number(x.participant_id)===pid()), all=predictions.filter(x=>Number(x.match_id)===Number(m.id));
    let tips=all.length?all.map(x=>{let p=byId(participants,x.participant_id);return `<div class="tip-line"><span><b>${p?.name||"Okänd"}</b>: ${x.pick} • ${x.predicted_score}${x.advancing_team?" • Vidare: "+x.advancing_team:""}</span><span>${x.comment||""}</span></div>`}).join(""):"<p>Inga tips än.</p>";
    c.insertAdjacentHTML("beforeend",`<div class="match"><div class="teams"><div class="team"><span class="flag">${m.home_flag||""}</span><span>${m.home_team}</span></div><div class="vs">VS</div><div class="team away"><span>${m.away_team}</span><span class="flag">${m.away_flag||""}</span></div></div><div class="meta">Match ${m.match_no} • ${m.group_name||m.round} • ${fmt(m.start_time)}</div><div class="ai">Mina tips: <b>${m.ai_pick||"-"}</b>, resultat <b>${m.ai_score||"-"}</b></div>${m.actual_score?`<div class="ok">Resultat: ${m.actual_score} • ${m.decided_by||"ordinarie tid"} ${m.advancing_team?"• Vidare: "+m.advancing_team:""}</div>`:""}${closed(m)?`<div class="closed">Matchen har börjat. Tips är stängda.</div>`:""}${my?`<div class="ok">Ditt tips är inskickat och läst: ${my.pick} • ${my.predicted_score}</div>`:`<div class="row"><select id="pick_${m.id}" ${closed(m)?"disabled":""}><option value="">Välj tips</option><option value="1">1 - ${m.home_team}</option><option value="X">X - Oavgjort</option><option value="2">2 - ${m.away_team}</option></select><input id="score_${m.id}" placeholder="Resultat, t.ex. 2-1" ${closed(m)?"disabled":""}></div><div class="row" style="margin-top:10px"><input id="advance_${m.id}" placeholder="Slutspel: lag som går vidare" ${closed(m)?"disabled":""}><input id="comment_${m.id}" placeholder="Kort kommentar" ${closed(m)?"disabled":""}></div><div class="actions" style="margin-top:10px"><button class="success" onclick="submitTip(${m.id})" ${closed(m)?"disabled":""}>Skicka in tips</button><button class="secondary" onclick="copyAi(${m.id},'${m.ai_pick||""}','${m.ai_score||""}')">Använd mina tips</button></div>`}<div style="margin-top:12px"><span class="pill">Alla tips</span>${tips}</div>${isAdmin?`<button class="danger" onclick="clearMatchId(${m.id})" style="margin-top:10px">Admin: rensa denna match</button>`:""}</div>`)
    });
}

function copyAi(id,p,s){document.getElementById("pick_"+id).value=p;document.getElementById("score_"+id).value=s}
async function submitTip(id){let m=byId(matches,id);if(closed(m)){alert("Matchen har bÃ¶rjat.");return}let pick=document.getElementById("pick_"+id).value, predicted_score=document.getElementById("score_"+id).value.trim(), comment=document.getElementById("comment_"+id).value.trim(), advancing_team=document.getElementById("advance_"+id).value.trim();if(!pick||!predicted_score){alert("Fyll i tips och resultat.");return}if(!confirm("Efter inskick läses tipset och alla kan se det direkt. Skicka?"))return;let r=await sb.from("predictions").insert({participant_id:pid(),match_id:id,pick,predicted_score,comment,advancing_team});if(r.error){alert("Kunde inte spara. Du kanske redan har tipsat eller matchen har bÃ¶rjat.");console.log(r.error)}await loadData();}
function toggleAdmin(){document.getElementById("adminPanel").classList.toggle("hidden")}
function adminLogin(){if(document.getElementById("adminPin").value===ADMIN_PIN){isAdmin=true;document.getElementById("adminTools").classList.remove("hidden");renderMatches()}else alert("Fel PIN")}
async function clearParticipant(){if(!isAdmin)return;let id=Number(document.getElementById("adminParticipant").value),p=byId(participants,id);if(confirm("Rensa alla tips får "+p.name+"?")){await sb.from("predictions").delete().eq("participant_id",id);loadData()}}
async function clearMatch(){clearMatchId(Number(document.getElementById("adminMatch").value))}
async function clearMatchId(id){if(!isAdmin)return;if(confirm("Rensa alla tips får matchen?")){await sb.from("predictions").delete().eq("match_id",id);loadData()}}
async function updateMatchTime(){if(!isAdmin)return;let id=Number(document.getElementById("adminMatch").value),start_time=document.getElementById("adminStartTime").value.trim();if(!start_time){alert("Skriv tid.");return}await sb.from("matches").update({start_time}).eq("id",id);loadData()}
async function updateResult(){if(!isAdmin)return;let id=Number(document.getElementById("adminMatch").value),actual_score=document.getElementById("adminActualScore").value.trim(),decided_by=document.getElementById("adminDecidedBy").value,advancing_team=document.getElementById("adminAdvancingTeam").value.trim();await sb.from("matches").update({actual_score,decided_by,advancing_team}).eq("id",id);loadData()}
document.getElementById("search").addEventListener("input",renderMatches);document.getElementById("groupFilter").addEventListener("change",renderMatches);document.getElementById("person").addEventListener("change",renderMatches);
</script></body></html>
