<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VM-Tipset 2026 – Mobil</title>
  <style>
    :root {
      --blue:#0b5cab;
      --dark:#06396f;
      --bg:#f4f6f8;
      --card:#fff;
      --text:#222;
      --muted:#666;
      --border:#d9dee5;
      --green:#0d7a3b;
      --red:#b00020;
    }
    * { box-sizing:border-box; }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      margin:0;
      color:var(--text);
      font-size:16px;
    }
    header {
      background: linear-gradient(135deg, var(--blue), var(--dark));
      color:#fff;
      padding:22px 16px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow:0 2px 10px rgba(0,0,0,.18);
    }
    header h1 {
      margin:0 0 6px;
      font-size:24px;
    }
    header p {
      margin:0;
      font-size:14px;
      opacity:.95;
    }
    .container {
      max-width:760px;
      margin:16px auto;
      padding:0 12px 70px;
    }
    .controls {
      background:#fff;
      border-radius:14px;
      padding:12px;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.07);
      margin-bottom:16px;
    }
    input, select, textarea, button {
      font-family:inherit;
      font-size:16px;
      width:100%;
    }
    input, select, textarea {
      padding:12px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
    }
    textarea {
      min-height:70px;
      resize:vertical;
    }
    button {
      border:none;
      border-radius:10px;
      padding:13px 14px;
      cursor:pointer;
      font-weight:700;
      background:var(--blue);
      color:#fff;
    }
    button.secondary { background:#555; }
    button.danger { background:var(--red); }
    button.success { background:var(--green); }
    button:disabled {
      background:#b8c0cc;
      cursor:not-allowed;
    }
    .date-title {
      margin:22px 0 10px;
      color:var(--dark);
      border-left:5px solid var(--blue);
      padding-left:10px;
      font-size:21px;
    }
    .match {
      background:var(--card);
      border:1px solid #edf0f4;
      border-radius:16px;
      padding:14px;
      margin-bottom:14px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .match.locked {
      border-color:#bcd9c8;
      background:#fbfffc;
    }
    .match-top {
      margin-bottom:12px;
    }
    .teams {
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:8px;
      align-items:center;
      color:#0b3f78;
      font-weight:800;
      font-size:18px;
      line-height:1.25;
    }
    .team {
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
    }
    .team.away {
      justify-content:flex-end;
      text-align:right;
    }
    .flag {
      font-size:25px;
      flex:0 0 auto;
    }
    .vs {
      color:#777;
      font-weight:700;
      font-size:15px;
    }
    .meta {
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-top:8px;
    }
    .grid {
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .two {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .field {
      display:flex;
      flex-direction:column;
      gap:5px;
    }
    label {
      font-weight:700;
      font-size:13px;
    }
    .status {
      margin-top:10px;
      padding:10px;
      border-radius:10px;
      font-size:14px;
      font-weight:700;
      display:none;
    }
    .status.locked {
      display:block;
      background:#e8f5ee;
      color:#0b6b34;
      border:1px solid #bcd9c8;
    }
    .actions {
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }
    .footer-note {
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
      font-size:13px;
    }
    @media (min-width:720px) {
      .controls {
        grid-template-columns:1.2fr .8fr .8fr .8fr;
        align-items:center;
      }
      .actions {
        grid-template-columns:1fr 1fr;
      }
      header h1 { font-size:28px; }
    }
  </style>
</head>

    function key(no, field) {
      return `vm2026_${no}_${field}`;
    }

    function isSubmitted(no) {
      return localStorage.getItem(key(no, "submitted")) === "true";
    }

    function peopleOptions(saved) {
      return '<option value="">Välj namn</option>' + people.map(p =>
        `<option value="${p}" ${saved === p ? "selected" : ""}>${p}</option>`
      ).join("");
    }

    function saveMatch(no) {
      document.querySelectorAll(`[data-no="${no}"]`).forEach(el => {
        localStorage.setItem(key(el.dataset.no, el.dataset.field), el.value);
      });
    }

    function submitMatch(no) {
      const name = document.querySelector(`[data-no="${no}"][data-field="name"]`).value;
      const tip = document.querySelector(`[data-no="${no}"][data-field="tip"]`).value;
      const score = document.querySelector(`[data-no="${no}"][data-field="score"]`).value.trim();

      if (!name || !tip || !score) {
        alert("Fyll i namn, tips och resultat innan du skickar in.");
        return;
      }

      if (!confirm("När du skickar in låses tipset för den här matchen. Vill du fortsätta?")) return;

      saveMatch(no);
      localStorage.setItem(key(no, "submitted"), "true");
      localStorage.setItem(key(no, "submittedAt"), new Date().toLocaleString("sv-SE"));
      render();
    }

    function render() {
      const q = document.getElementById("search").value.toLowerCase();
      const group = document.getElementById("groupFilter").value;
      const container = document.getElementById("matches");
      container.innerHTML = "";

      const filtered = matches
        .filter(m => !group || m.group === group)
        .filter(m => `${m.date} ${m.group} ${m.home} ${m.away}`.toLowerCase().includes(q));

      let currentDate = "";
      filtered.forEach(m => {
        if (m.date !== currentDate) {
          currentDate = m.date;
          const h2 = document.createElement("h2");
          h2.className = "date-title";
          h2.textContent = currentDate + " 2026";
          container.appendChild(h2);
        }

        const submitted = isSubmitted(m.no);
        const savedName = localStorage.getItem(key(m.no, "name")) || "";
        const savedTip = localStorage.getItem(key(m.no, "tip")) || "";
        const submittedAt = localStorage.getItem(key(m.no, "submittedAt")) || "";

        const div = document.createElement("div");
        div.className = "match" + (submitted ? " locked" : "");
        div.innerHTML = `
          <div class="match-top">
            <div class="teams">
              <div class="team"><span class="flag">${m.homeFlag}</span><span>${m.home}</span></div>
              <div class="vs">VS</div>
              <div class="team away"><span>${m.away}</span><span class="flag">${m.awayFlag}</span></div>
            </div>
            <div class="meta">Match ${m.no} • ${m.group}</div>
          </div>

          <div class="grid">
            <div class="field">
              <label>Namn</label>
              <select data-no="${m.no}" data-field="name" ${submitted ? "disabled" : ""}>${peopleOptions(savedName)}</select>
            </div>

            <div class="two">
              <div class="field">
                <label>Tips 1/X/2</label>
                <select data-no="${m.no}" data-field="tip" ${submitted ? "disabled" : ""}>
                  <option value="">Välj</option>
                  <option value="1" ${savedTip === "1" ? "selected" : ""}>1</option>
                  <option value="X" ${savedTip === "X" ? "selected" : ""}>X</option>
                  <option value="2" ${savedTip === "2" ? "selected" : ""}>2</option>
                </select>
              </div>
              <div class="field">
                <label>Resultat</label>
                <input data-no="${m.no}" data-field="score" value="${localStorage.getItem(key(m.no, "score")) || ""}" placeholder="t.ex. 2-1" ${submitted ? "disabled" : ""}>
              </div>
            </div>

            <div class="field">
              <label>Kommentar</label>
              <textarea data-no="${m.no}" data-field="comment" placeholder="Kort kommentar..." ${submitted ? "disabled" : ""}>${localStorage.getItem(key(m.no, "comment")) || ""}</textarea>
            </div>

            <div class="status ${submitted ? "locked" : ""}">
              ✅ Inskickat och låst ${submittedAt ? "• " + submittedAt : ""}
            </div>

            <div class="actions">
              <button class="success" onclick="submitMatch(${m.no})" ${submitted ? "disabled" : ""}>
                ${submitted ? "Tips inskickat" : "Skicka in tips"}
              </button>
              <button class="secondary" onclick="saveMatch(${m.no})" ${submitted ? "disabled" : ""}>
                Spara utan att skicka
              </button>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function clearAll() {
      if (!confirm("Vill du rensa alla sparade och inskickade tips i den här webbläsaren?")) return;
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith("vm2026_")) localStorage.removeItem(k);
      });
      render();
    }

    function exportCSV() {
      const rows = [["Match", "Datum", "Grupp", "Lag 1", "Lag 2", "Namn", "Tips", "Resultat", "Kommentar", "Inskickad", "Inskickad datum"]];
      matches.forEach(m => {
        rows.push([
          m.no,
          m.date + " 2026",
          m.group,
          m.home,
          m.away,
          localStorage.getItem(key(m.no, "name")) || "",
          localStorage.getItem(key(m.no, "tip")) || "",
          localStorage.getItem(key(m.no, "score")) || "",
          localStorage.getItem(key(m.no, "comment")) || "",
          isSubmitted(m.no) ? "Ja" : "Nej",
          localStorage.getItem(key(m.no, "submittedAt")) || ""
        ]);
      });
      const csv = rows.map(r => r.map(v => `"${String(v).replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "vm-tipset-2026-mobil.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("groupFilter").addEventListener("change", render);
    render();
  </script>
</body>
</html>
